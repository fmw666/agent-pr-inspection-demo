name: 🚦 Serial AI PR Orchestrator

on:
  check_run:
    types: [completed]

jobs:
  trigger-greptile-after-cursor:
    name: 🛡️ Trigger Phase 2 (Greptile)
    # Only trigger when the 'Cursor Automation' check run has completed with success
    if: github.event.check_run.name == 'Cursor Automation: auto-PR test' && github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 📢 Trigger Greptile Architecture Review
        uses: actions/github-script@v6
        with:
          script: |
            // Find the pull request associated with the commit that triggered the check_run
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${github.event.check_run.check_suite.head_branch}`,
              state: 'open'
            });
            
            if (prs.data.length === 0) {
              console.log("No open PR found for this check run. Skipping Greptile trigger.");
              return;
            }
            
            const prNumber = prs.data[0].number;
            
            console.log(`Cursor logic check passed (Status: Success)! Triggering Greptile for PR #${prNumber}...`);
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "🚀 **[Phase 1] Cursor Logic Review Passed!**\n\n@greptile-apps[bot] Please perform the [Phase 2] Architecture and Blast Radius review."
            });
